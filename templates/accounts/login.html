{% extends "shared/base.html" %} 
{% load socialaccount %} 

{% block title %}Login{% endblock title %} 

{% block content %}

<div
  class="w-[400px] min-h-[600px] mx-auto bg-gradient-to-r from-neutral-50 to-neutral-100 shadow-lg rounded-lg p-8 hover:shadow-2xl transition-shadow duration-300 ease-in-out transform"
>
  <h1 class="text-4xl font-title text-center text-blue-600 mb-6 tracking-wide">
    Login
  </h1>
  <form class="space-y-6">
    <div class="space-y-1">
      <label htmlFor="email" class="block text-lg font-medium"> Email </label>
      <div class="relative">
        <span
          class="material-symbols-outlined absolute left-3 top-2 text-blue-300"
          >mail</span
        >
        <input
          id="email"
          type="email"
          class="w-full px-10 py-3 border border-blue-300 rounded-md focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-300/50 transition-all duration-300 ease-in-out transform focus:scale-105"
          placeholder="Your email"
        />
      </div>
    </div>
    <div class="space-y-1">
      <label htmlFor="password" class="block text-lg font-medium">
        Password
      </label>
      <div class="relative">
        <span
          class="material-symbols-outlined absolute left-3 top-2 text-blue-300"
          >lock</span
        >
        <input
          id="password"
          type="password"
          class="w-full px-10 py-3 border border-blue-300 rounded-md focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-300/50 transition-all duration-300 ease-in-out transform focus:scale-105"
          placeholder="Your password"
        />
      </div>
    </div>
    <div class="text-error-600 text-center">
      <span class="text-sm fade-in">Error: Invalid email or password!</span>
    </div>
    <button
      type="submit"
      class="w-full px-4 py-3 bg-blue-700 text-neutral-50 rounded-full hover:bg-blue-600 focus:bg-blue-800 transition-transform transform hover:scale-105 duration-300"
    >
      Login
    </button>
  </form>

  <div class="mt-6 text-center space-y-4">
    <a
      href="{% provider_login_url 'google' %}"
      class="w-full py-3 border border-neutral-400 rounded-full flex items-center justify-center hover:bg-neutral-50 focus:bg-blue-100 transition-transform transform hover:scale-105 duration-300"
    >
      <img
        src="https://img.icons8.com/color/48/000000/google-logo.png"
        alt="Google"
        class="w-[24px] h-[24px] mr-2 object-cover"
      />
      Sign in with Google
    </a>
		<a
      href="{% provider_login_url 'line' %}"
      class="w-full py-3 border border-neutral-400 rounded-full flex items-center justify-center hover:bg-neutral-50 focus:bg-blue-100 transition-transform transform hover:scale-105 duration-300"
    >
      <img
        src="https://img.icons8.com/color/48/000000/line-me.png"
        alt="Google"
        class="w-[24px] h-[24px] mr-2 object-cover"
      />
      Sign in with LINE
    </a>
    <a href="#" class="block text-sm text-blue-600 hover:underline">
      Forgot your password?
    </a>
    <p class="text-sm mt-4">
      Don't have an account?
      <a href="#" class="text-blue-600 hover:underline"> Create one </a>
    </p>
  </div>
</div>

{% endblock content %}
