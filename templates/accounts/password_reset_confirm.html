{% extends "shared/base.html" %}

{% block title %}Password Reset Confirm{% endblock title %}


{% block content %}
<h2>重設密碼</h2>
{% if validlink %}
<p>請輸入您的新密碼：</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">重設密碼</button>
</form>
{% else %}
<p>無效的密碼重置連結，請重新請求。</p>
{% endif %}
{% endblock content %}
