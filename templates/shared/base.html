{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="{% static "styles/output.css" %}" rel="stylesheet" />
    <title>Django | {% block title %}{% endblock title %}</title>
    <!-- Google Maps -->
    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap"
    ></script>
    <script src="{% static 'scripts/output.js' %}" defer></script>
  </head>
  <body class="flex flex-col min-h-screen gap-y-10">
    {% include "shared/header.html" %}
    <main class="flex-grow">{% block content %}{% endblock content %}</main>
    {% include "shared/footer.html" %}
  </body>
</html>
